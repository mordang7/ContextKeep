services:
  mcp-server:
    build: .
    command: python server.py --transport sse --host 0.0.0.0
    ports:
      - "5100:5100"
    volumes:
      - contextkeep-data:/app/data
    restart: unless-stopped

  webui:
    build: .
    command: python webui.py
    ports:
      - "5000:5000"
    volumes:
      - contextkeep-data:/app/data
    depends_on:
      - mcp-server
    restart: unless-stopped

volumes:
  contextkeep-data:
